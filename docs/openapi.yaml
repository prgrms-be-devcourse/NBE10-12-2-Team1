openapi: 3.0.3
info:
  title: NBE10-12-2-Team1 API
  description: |
    오늘 뭐먹지 SNS 서비스 REST API 문서입니다.

    ## 인증
    인증이 필요한 API는 요청 헤더에 Bearer 토큰을 포함해야 합니다.
    ```
    Authorization: Bearer {accessToken}
    ```
  version: 1.0.0

servers:
  - url: https://api.example.com
    description: Production Server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: object
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: "ERROR_CODE"
            message:
              type: string
              example: "상세한 에러 메시지 내용"

tags:
  - name: Auth
    description: 🔐 인증 및 토큰 관리
  - name: Users
    description: 👤 회원 관리
  - name: Follow
    description: 👥 관계 관리
  - name: Restaurants
    description: 🍽️ 식당 관리 및 검색
  - name: Feeds
    description: 📝 피드 게시글 관리
  - name: Comments
    description: 💬 댓글 관리
  - name: Lists
    description: 📋 맛집 리스트

paths:

  # ─────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────
  /api/v1/auth/reissue:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      description: Refresh Token을 이용해 새로운 Access Token과 Refresh Token을 발급합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: "existing_refresh_token"
      responses:
        "200":
          description: 토큰 재발급 성공
          content:
            application/json:
              example:
                success: true
                data:
                  accessToken: "new_access_token_jwt"
                  refreshToken: "new_refresh_token_jwt"
        "400":
          description: Refresh Token이 요청에 없음
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "MISSING_REFRESH_TOKEN"
                  message: "Refresh Token이 필요합니다."
        "401":
          description: Refresh Token 만료 / 위조 / 불일치 / 연결된 사용자 없음
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_REFRESH_TOKEN"
                  message: "유효하지 않은 Refresh Token입니다. 다시 로그인해주세요."
        "500":
          description: 서버 오류 / Access Token 재발급 실패
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 일반 회원가입
      description: 이메일과 비밀번호로 회원가입합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, nickname]
              properties:
                email:
                  type: string
                  format: email
                  example: "foodie@example.com"
                password:
                  type: string
                  minLength: 8
                  example: "password123!"
                nickname:
                  type: string
                  maxLength: 20
                  example: "푸디보이"
      responses:
        "201":
          description: 회원가입 성공
          content:
            application/json:
              example:
                success: true
                data:
                  userId: 1
                  email: "foodie@example.com"
                  nickname: "푸디보이"
                  role: "USER"
                message: "회원가입이 완료되었습니다."
        "400":
          description: 필수 필드 누락 / 이메일 형식 오류 / 비밀번호 8자 미만 / 닉네임 20자 초과
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_INPUT_VALUE"
                  message: "입력값이 올바르지 않습니다."
        "409":
          description: 이미 사용 중인 이메일 (DUPLICATE_EMAIL)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "DUPLICATE_EMAIL"
                  message: "이미 사용 중인 이메일입니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 일반 로그인
      description: 이메일과 비밀번호로 로그인합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "foodie@example.com"
                password:
                  type: string
                  example: "password123!"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              example:
                success: true
                data:
                  userId: 1
                  nickname: "푸디보이"
                  profileImage: null
                  email: "foodie@example.com"
                  role: "USER"
                  accessToken: "eyJhbGciOi..."
                  refreshToken: "eyJhbGciOi..."
                message: "로그인에 성공했습니다."
        "400":
          description: 필수 필드 누락 / 이메일 형식 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_INPUT_VALUE"
                  message: "입력값이 올바르지 않습니다."
        "401":
          description: 이메일 또는 비밀번호 불일치 (INVALID_CREDENTIALS)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_CREDENTIALS"
                  message: "이메일 또는 비밀번호가 올바르지 않습니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: Refresh Token을 무효화하여 로그아웃합니다. 카카오 및 일반 로그인 공통으로 사용합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: "existing_refresh_token"
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              example:
                success: true
                data: null
                message: "로그아웃되었습니다."
        "400":
          description: Refresh Token 누락
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "MISSING_REFRESH_TOKEN"
                  message: "Refresh Token이 필요합니다."
        "401":
          description: 유효하지 않은 Refresh Token
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_REFRESH_TOKEN"
                  message: "유효하지 않은 Refresh Token입니다. 다시 로그인해주세요."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  # ─────────────────────────────────────────────
  # Users
  # ─────────────────────────────────────────────
  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: 프로필 조회
      description: 사용자 ID로 프로필 정보를 조회합니다. 본인 조회 시 isMyProfile=true, 타인 조회 시 isMyProfile=false와 isFollowing 여부를 함께 반환합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 조회할 사용자 ID
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: 프로필 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  userId: 1
                  nickname: "푸디보이"
                  profileImage: "https://k.kakaocdn.net/.../img.jpg"
                  email: "foodie@kakao.com"
                  role: "USER"
                  followerCount: 5
                  followingCount: 3
                  isMyProfile: true
                  isFollowing: false
        "401":
          description: 인증 토큰 없음 또는 만료
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "UNAUTHORIZED"
                  message: "인증이 만료되었습니다. 다시 로그인해주세요."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  # ─────────────────────────────────────────────
  # Follow
  # ─────────────────────────────────────────────
  /api/v1/users/{id}/follow:
    post:
      tags: [Follow]
      summary: 팔로우
      description: 특정 사용자를 팔로우합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 팔로우할 사용자 ID
          schema:
            type: integer
            example: 2
      responses:
        "200":
          description: 팔로우 성공
          content:
            application/json:
              example:
                success: true
                data:
                  followId: 99
                  followerId: 1
                  followingId: 2
                  createdAt: "2026-06-18T18:00:00"
        "400":
          description: 자기 자신 팔로우 시도 (SELF_FOLLOW_NOT_ALLOWED)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "SELF_FOLLOW_NOT_ALLOWED"
                  message: "자기 자신을 팔로우할 수 없습니다."
        "404":
          description: 존재하지 않는 유저 (USER_NOT_FOUND)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "USER_NOT_FOUND"
                  message: "존재하지 않는 사용자입니다."
        "409":
          description: 이미 팔로우 중 (ALREADY_FOLLOWING)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "ALREADY_FOLLOWING"
                  message: "이미 팔로우 중인 사용자입니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

    delete:
      tags: [Follow]
      summary: 언팔로우
      description: 특정 사용자의 팔로우를 취소합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 언팔로우할 사용자 ID
          schema:
            type: integer
            example: 2
      responses:
        "200":
          description: 언팔로우 성공
          content:
            application/json:
              example:
                success: true
                data: null
        "401":
          description: 로그인하지 않은 사용자
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "UNAUTHORIZED"
                  message: "로그인 후 이용해주세요."
        "404":
          description: 팔로우 관계가 존재하지 않음 (FOLLOW_NOT_FOUND)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "FOLLOW_NOT_FOUND"
                  message: "팔로우 관계가 존재하지 않습니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  /api/v1/users/{id}/followings:
    get:
      tags: [Follow]
      summary: 팔로잉 목록 조회
      description: 특정 사용자가 팔로우하는 목록을 페이지네이션으로 조회합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 사용자 ID
          schema:
            type: integer
            example: 1
        - name: page
          in: query
          required: false
          description: 페이지 번호 (기본값 0)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기 (기본값 20)
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 팔로잉 목록 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  followings:
                    - userId: 2
                      nickname: "서교동김푸디"
                      profileImage: "https://k.kakaocdn.net/.../profile2.jpg"
                      isFollowedByMe: true
                  totalPages: 1
                  totalElements: 3
        "400":
          description: userId 형식 오류 또는 page/size가 0 이하 (INVALID_INPUT_VALUE / INVALID_PAGE_SIZE)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_INPUT_VALUE"
                  message: "입력값이 올바르지 않습니다."
        "404":
          description: 존재하지 않는 유저 (USER_NOT_FOUND)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "USER_NOT_FOUND"
                  message: "존재하지 않는 사용자입니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  /api/v1/users/{id}/followers:
    get:
      tags: [Follow]
      summary: 팔로워 목록 조회
      description: 특정 사용자를 팔로우하는 목록을 페이지네이션으로 조회합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 사용자 ID
          schema:
            type: integer
            example: 1
        - name: page
          in: query
          required: false
          description: 페이지 번호 (기본값 0)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기 (기본값 20)
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 팔로워 목록 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  followers:
                    - userId: 3
                      nickname: "망원동고독가"
                      profileImage: "https://k.kakaocdn.net/.../profile3.jpg"
                      isFollowedByMe: false
                  totalPages: 1
                  totalElements: 5
        "400":
          description: userId 형식 오류 또는 page/size가 0 이하 (INVALID_INPUT_VALUE / INVALID_PAGE_SIZE)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_INPUT_VALUE"
                  message: "입력값이 올바르지 않습니다."
        "404":
          description: 존재하지 않는 유저 (USER_NOT_FOUND)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "USER_NOT_FOUND"
                  message: "존재하지 않는 사용자입니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

  # ─────────────────────────────────────────────
  # Restaurantsdd
  # ─────────────────────────────────────────────
  /api/v1/restaurants/search:
    get:
      tags: [Restaurants]
      summary: 식당 검색 (카카오맵 API 연동)
      description: 키워드로 식당을 검색합니다. 인증 불필요.
      security: []
      parameters:
        - name: query
          in: query
          required: true
          description: 검색 키워드 (예 - 을지로 삼겹살)
          schema:
            type: string
            example: "을지로 삼겹살"
        - name: x
          in: query
          required: false
          description: 경도 (Longitude)
          schema:
            type: number
            format: double
            example: 126.9780
        - name: "y"
          in: query
          required: false
          description: 위도 (Latitude)
          schema:
            type: number
            format: double
            example: 37.5665
        - name: radius
          in: query
          required: false
          description: 반경 미터 단위 (최대 20000)
          schema:
            type: integer
            maximum: 20000
            example: 1000
      responses:
        "200":
          description: 식당 검색 성공
          content:
            application/json:
              example:
                success: true
                data:
                  restaurants:
                    - id: 1
                      kakaoPlaceId: "12345678"
                      name: "을지삼겹"
                      category: "한식"
                      address: "서울 중구 을지로3가 12-3"
                      roadAddress: "서울 중구 을지로 123길 4"
                      phone: "02-123-4567"
                      lat: 37.5665
                      lng: 126.9780
                      feedCount: 12
        "400":
          description: 필수 파라미터 query 누락 또는 radius 20000 초과
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INVALID_REQUEST"
                  message: "검색어(query)는 필수입니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."
        "502":
          description: 카카오맵 API 통신 실패
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "BAD_GATEWAY"
                  message: "카카오맵 서비스와의 통신에 실패했습니다. 잠시 후 다시 시도해주세요."

  /api/v1/restaurants/recommend:
    get:
      tags: [Restaurants]
      summary: 조건 필터 기반 맛집 추천
      description: 현재 위치와 조건을 기반으로 맛집을 추천합니다. 인증 불필요.
      security: []
      parameters:
        - name: lat
          in: query
          required: true
          description: 현재 위치 위도 (-90 ~ 90)
          schema:
            type: number
            format: double
            example: 37.5665
        - name: lng
          in: query
          required: true
          description: 현재 위치 경도 (-180 ~ 180)
          schema:
            type: number
            format: double
            example: 126.9780
        - name: category
          in: query
          required: false
          description: 음식 카테고리
          schema:
            type: string
            enum: ["한식", "일식", "양식", "중식"]
            example: "한식"
        - name: mood
          in: query
          required: false
