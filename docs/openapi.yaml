openapi: 3.0.3
info:
  title: NBE10-12-2-Team1 API
  description: |
    오늘 뭐먹지 SNS 서비스 REST API 문서입니다.

    ## 인증
    인증이 필요한 API는 요청 헤더에 Bearer 토큰을 포함해야 합니다.
    ```
    Authorization: Bearer {accessToken}
    ```
  version: 1.0.0

servers:
  - url: https://api.example.com
    description: Production Server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: object
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: "ERROR_CODE"
            message:
              type: string
              example: "상세한 에러 메시지 내용"

tags:
  - name: Auth
    description: 🔐 인증 및 토큰 관리
  - name: Users
    description: 👤 회원 관리
  - name: Follow
    description: 👥 관계 관리
  - name: Restaurants
    description: 🍽️ 식당 관리 및 검색
  - name: Posts
    description: 📝 피드 게시글 관리
  - name: Lists
    description: 📋 맛집 리스트

paths:

  # ─────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────
  /api/v1/auth/login/kakao:
    post:
      tags: [Auth]
      summary: 카카오 로그인 / 회원가입
      description: 카카오 SDK에서 발급받은 Access Token으로 로그인 또는 회원가입을 처리합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kakaoAccessToken]
              properties:
                kakaoAccessToken:
                  type: string
                  example: "kakao_sdk_token"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              example:
                success: true
                data:
                  userId: 1
                  nickname: "푸디보이"
                  profileImage: "https://k.kakaocdn.net/.../img.jpg"
                  email: "foodie@kakao.com"
                  role: "USER"
                  accessToken: "eyJhbGciOi..."
                  refreshToken: "eyJhbGciOi..."
                message: "로그인에 성공했습니다."
        "400":
          description: 인가 코드 없음 또는 형식 잘못됨 (INVALID_KAKAO_TOKEN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 카카오 인가 코드 만료 / 카카오 인증 실패 (KAKAO_TOKEN_EXPIRED)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류 / DB 오류 / JWT 발급 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: 카카오 API 통신 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/reissue:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      description: Refresh Token을 이용해 새로운 Access Token과 Refresh Token을 발급합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: "existing_refresh_token"
      responses:
        "200":
          description: 토큰 재발급 성공
          content:
            application/json:
              example:
                success: true
                data:
                  accessToken: "new_access_token_jwt"
                  refreshToken: "new_refresh_token_jwt"
        "400":
          description: Refresh Token이 요청에 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Refresh Token 만료 / 위조 / 불일치 / 연결된 사용자 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류 / Access Token 재발급 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────────
  # Users
  # ─────────────────────────────────────────────
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: 내 프로필 조회
      description: 현재 로그인된 사용자의 프로필 정보를 조회합니다.
      responses:
        "200":
          description: 프로필 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  userId: 1
                  nickname: "푸디보이"
                  profileImage: "https://k.kakaocdn.net/.../img.jpg"
                  email: "foodie@kakao.com"
                  role: "USER"
                  followerCount: 5
                  followingCount: 3
        "401":
          description: 인증 토큰 없음 또는 만료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────────
  # Follow
  # ─────────────────────────────────────────────
  /api/v1/users/{id}/follow:
    post:
      tags: [Follow]
      summary: 팔로우
      description: 특정 사용자를 팔로우합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 팔로우할 사용자 ID
          schema:
            type: integer
            example: 2
      responses:
        "200":
          description: 팔로우 성공
          content:
            application/json:
              example:
                success: true
                data:
                  followId: 99
                  followerId: 1
                  followingId: 2
                  createdAt: "2026-06-18T18:00:00"
        "400":
          description: 자기 자신 팔로우 시도 (SELF_FOLLOW_NOT_ALLOWED)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "SELF_FOLLOW_NOT_ALLOWED"
                  message: "자기 자신을 팔로우할 수 없습니다."
        "404":
          description: 존재하지 않는 유저 (USER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 이미 팔로우 중 (ALREADY_FOLLOWING)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Follow]
      summary: 언팔로우
      description: 특정 사용자의 팔로우를 취소합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 언팔로우할 사용자 ID
          schema:
            type: integer
            example: 2
      responses:
        "200":
          description: 언팔로우 성공
          content:
            application/json:
              example:
                success: true
                data: null
        "401":
          description: 로그인하지 않은 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 팔로우 관계가 존재하지 않음 (FOLLOW_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/{id}/followings:
    get:
      tags: [Follow]
      summary: 팔로잉 목록 조회
      description: 특정 사용자가 팔로우하는 목록을 페이지네이션으로 조회합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 사용자 ID
          schema:
            type: integer
            example: 1
        - name: page
          in: query
          required: false
          description: 페이지 번호 (기본값 0)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기 (기본값 20)
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 팔로잉 목록 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  followings:
                    - userId: 2
                      nickname: "서교동김푸디"
                      profileImage: "https://k.kakaocdn.net/.../profile2.jpg"
                      isFollowedByMe: true
                  totalPages: 1
                  totalElements: 3
        "400":
          description: userId 형식 오류 또는 page/size가 0 이하 (INVALID_INPUT_VALUE / INVALID_PAGE_SIZE)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 존재하지 않는 유저 (USER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/{id}/followers:
    get:
      tags: [Follow]
      summary: 팔로워 목록 조회
      description: 특정 사용자를 팔로우하는 목록을 페이지네이션으로 조회합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 사용자 ID
          schema:
            type: integer
            example: 1
        - name: page
          in: query
          required: false
          description: 페이지 번호 (기본값 0)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기 (기본값 20)
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 팔로워 목록 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  followers:
                    - userId: 3
                      nickname: "망원동고독가"
                      profileImage: "https://k.kakaocdn.net/.../profile3.jpg"
                      isFollowedByMe: false
                  totalPages: 1
                  totalElements: 5
        "400":
          description: userId 형식 오류 또는 page/size가 0 이하 (INVALID_INPUT_VALUE / INVALID_PAGE_SIZE)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 존재하지 않는 유저 (USER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────────
  # Restaurants
  # ─────────────────────────────────────────────
  /api/v1/restaurants/search:
    get:
      tags: [Restaurants]
      summary: 식당 검색 (카카오맵 API 연동)
      description: 키워드로 식당을 검색합니다. 인증 불필요.
      security: []
      parameters:
        - name: query
          in: query
          required: true
          description: 검색 키워드 (예 - 을지로 삼겹살)
          schema:
            type: string
            example: "을지로 삼겹살"
        - name: x
          in: query
          required: false
          description: 경도 (Longitude)
          schema:
            type: number
            format: double
            example: 126.9780
        - name: "y"
          in: query
          required: false
          description: 위도 (Latitude)
          schema:
            type: number
            format: double
            example: 37.5665
        - name: radius
          in: query
          required: false
          description: 반경 미터 단위 (최대 20000)
          schema:
            type: integer
            maximum: 20000
            example: 1000
      responses:
        "200":
          description: 식당 검색 성공
          content:
            application/json:
              example:
                success: true
                data:
                  restaurants:
                    - id: 1
                      kakaoPlaceId: "12345678"
                      name: "을지삼겹"
                      category: "한식"
                      address: "서울 중구 을지로3가 12-3"
                      roadAddress: "서울 중구 을지로 123길 4"
                      phone: "02-123-4567"
                      lat: 37.5665
                      lng: 126.9780
                      avgRating: 4.5
                      postCount: 12
        "400":
          description: 필수 파라미터 query 누락 또는 radius 20000 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: 카카오맵 API 통신 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/restaurants/recommend:
    get:
      tags: [Restaurants]
      summary: 조건 필터 기반 맛집 추천
      description: 현재 위치와 조건을 기반으로 맛집을 추천합니다. 인증 불필요.
      security: []
      parameters:
        - name: lat
          in: query
          required: true
          description: 현재 위치 위도 (-90 ~ 90)
          schema:
            type: number
            format: double
            example: 37.5665
        - name: lng
          in: query
          required: true
          description: 현재 위치 경도 (-180 ~ 180)
          schema:
            type: number
            format: double
            example: 126.9780
        - name: category
          in: query
          required: false
          description: 음식 카테고리
          schema:
            type: string
            enum: ["한식", "일식", "양식", "중식"]
            example: "한식"
        - name: mood
          in: query
          required: false
          description: 분위기 태그
          schema:
            type: string
            enum: ["데이트", "혼밥", "회식", "야식"]
            example: "데이트"
        - name: sort
          in: query
          required: true
          description: 정렬 방식
          schema:
            type: string
            enum: ["RANDOM", "RATING", "DISTANCE"]
            example: "RATING"
      responses:
        "200":
          description: 맛집 추천 성공
          content:
            application/json:
              example:
                success: true
                data:
                  recommendations:
                    - restaurantId: 1
                      name: "을지삼겹"
                      category: "한식"
                      distanceMeter: 120
                      lat: 37.5665
                      lng: 126.9780
        "400":
          description: 필수 파라미터 누락 / 좌표 범위 초과 / sort 값 오류 (MISSING_REQUIRED_PARAM / INVALID_COORDINATES / INVALID_SORT_VALUE)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 조건에 맞는 식당 없음 (NO_RECOMMENDATIONS_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────────
  # Posts
  # ─────────────────────────────────────────────
  /api/v1/posts:
    post:
      tags: [Posts]
      summary: 피드 글 작성
      description: 새로운 피드 글을 작성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, restaurantId]
              properties:
                content:
                  type: string
                  maxLength: 1000
                  example: "오늘 을지로 삼겹살 먹었는데 대박이야!"
                restaurantId:
                  type: integer
                  example: 1
      responses:
        "201":
          description: 글 작성 성공
          content:
            application/json:
              example:
                success: true
                data:
                  postId: 45
                  userId: 1
                  nickname: "푸디보이"
                  profileImage: "https://k.kakaocdn.net/.../img.jpg"
                  content: "오늘 을지로 삼겹살 먹었는데 대박이야!"
                  restaurant:
                    id: 1
                    name: "을지삼겹"
                  createdAt: "2026-06-18T17:50:00"
                message: "글이 성공적으로 작성되었습니다."
        "400":
          description: content 없음 또는 1000자 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 로그인하지 않은 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 존재하지 않는 식당 (RESTAURANT_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 저장 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [Posts]
      summary: 피드 글 목록 조회
      description: |
        피드 글 목록을 조회합니다.

        **용례:**
        - `GET /api/v1/posts?restaurantId=1` → 특정 식당 태그된 글들 (식당 페이지)
        - `GET /api/v1/posts?userId=2` → 특정 유저의 글 (프로필 페이지)
        - `GET /api/v1/posts` → 전체 공개 글 (탐색)
      parameters:
        - name: restaurantId
          in: query
          required: false
          description: 특정 식당 태그 글만 필터링
          schema:
            type: integer
            example: 1
        - name: userId
          in: query
          required: false
          description: 특정 유저의 글만 필터링
          schema:
            type: integer
            example: 1
        - name: page
          in: query
          required: false
          description: 페이지 번호 (기본값 0)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기 (기본값 10)
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 글 목록 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  posts:
                    - postId: 45
                      userId: 1
                      nickname: "푸디보이"
                      profileImage: "https://k.kakaocdn.net/.../img.jpg"
                      content: "오늘 을지로 삼겹살 먹었는데 대박이야!"
                      restaurant:
                        id: 1
                        name: "을지삼겹"
                        category: "한식"
                      likeCount: 12
                      isLikedByMe: true
                      createdAt: "2026-06-18T17:50:00"
                  totalPages: 3
                  totalElements: 25
        "400":
          description: restaurantId/userId 형식 오류 또는 page/size가 0 이하 (INVALID_INPUT_VALUE / INVALID_PAGE_SIZE)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/posts/{id}:
    put:
      tags: [Posts]
      summary: 피드 글 수정
      description: 피드 글을 수정합니다. 본인만 가능합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 글 ID
          schema:
            type: integer
            example: 45
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  maxLength: 1000
                  example: "재방문했는데 여전히 맛있네요. 강력 추천합니다."
                restaurantId:
                  type: integer
                  example: 2
      responses:
        "200":
          description: 글 수정 성공
          content:
            application/json:
              example:
                success: true
                data:
                  postId: 45
                  content: "재방문했는데 여전히 맛있네요. 강력 추천합니다."
                  restaurantId: 2
                message: "글이 수정되었습니다."
        "400":
          description: content 1000자 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 로그인하지 않은 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
