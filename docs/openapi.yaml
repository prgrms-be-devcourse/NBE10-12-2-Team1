  # ─────────────────────────────────────────────
  # Restaurant Lists
  # ─────────────────────────────────────────────
  /api/v1/lists:
    post:
      tags: [Lists]
      summary: 맛집 리스트 생성
      description: 새로운 맛집 리스트를 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  maxLength: 200
                  example: "을지로 감성 데이트 코스"
                description:
                  type: string
                  maxLength: 500
                  example: "좁은 골목길 숨겨진 보석 같은 감성 맛집 모음집"
                moodTag:
                  type: string
                  enum: ["데이트", "혼밥", "회식", "야식"]
                  example: "데이트"
      responses:
        "201":
          description: 맛집 리스트 생성 성공
          content:
            application/json:
              example:
                success: true
                data:
                  listId: 10
                  userId: 1
                  title: "을지로 감성 데이트 코스"
                  description: "좁은 골목길 숨겨진 보석 같은 감성 맛집 모음집"
                  moodTag: "데이트"
                  createdAt: "2026-06-18T17:52:00"
                message: "맛집 리스트가 성공적으로 생성되었습니다."
        "400":
          description: title 비어있음 / 길이 초과 / moodTag 허용값 아님 (INVALID_MOOD_TAG)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 로그인하지 않은 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 리스트 저장 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [Lists]
      summary: 맛집 리스트 검색/목록 조회
      description: 맛집 리스트를 검색하거나 목록을 조회합니다.
      parameters:
        - name: q
          in: query
          required: false
          description: 검색어 (제목 + 설명)
          schema:
            type: string
            example: "을지로"
        - name: mood
          in: query
          required: false
          description: 분위기 태그 필터
          schema:
            type: string
            enum: ["데이트", "혼밥", "회식", "야식"]
            example: "데이트"
        - name: userId
          in: query
          required: false
          description: 특정 유저 리스트만 조회
          schema:
            type: integer
            example: 1
        - name: page
          in: query
          required: false
          description: 페이지 번호 (기본값 0)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기 (기본값 10)
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 맛집 리스트 목록 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  lists:
                    - listId: 10
                      userId: 1
                      nickname: "푸디보이"
                      title: "을지로 감성 데이트 코스"
                      moodTag: "데이트"
                      itemCount: 3
                      createdAt: "2026-06-18T17:52:00"
                  totalPages: 5
                  totalElements: 42
        "400":
          description: userId 형식 오류 또는 page/size가 0 이하 (INVALID_INPUT_VALUE / INVALID_PAGE_SIZE)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/lists/{id}:
    get:
      tags: [Lists]
      summary: 맛집 리스트 상세 조회 (아이템 포함)
      description: 특정 맛집 리스트의 상세 정보와 아이템 목록을 조회합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 리스트 ID
          schema:
            type: integer
            example: 10
      responses:
        "200":
          description: 리스트 상세 조회 성공
          content:
            application/json:
              example:
                success: true
                data:
                  listId: 10
                  userId: 1
                  creatorNickname: "푸디보이"
                  title: "을지로 감성 데이트 코스"
                  description: "좁은 골목길 숨겨진 보석 같은 감성 맛집 모음집"
                  moodTag: "데이트"
                  items:
                    - itemId: 30
                      restaurantId: 1
                      restaurantName: "을지삼겹"
                      category: "한식"
                      orderIndex: 1
                      memo: "삼겹살에 미나리 조합은 이길 수가 없음"
                      createdAt: "2026-06-18T17:53:00"
                  createdAt: "2026-06-18T17:52:00"
        "400":
          description: listId 형식 오류 (INVALID_INPUT_VALUE)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 존재하지 않는 리스트 (LIST_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/lists/{id}/items:
    post:
      tags: [Lists]
      summary: 리스트에 식당 추가
      description: 맛집 리스트에 식당을 추가합니다. 본인만 가능합니다. 리스트당 최대 5,000개까지 등록 가능합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 리스트 ID
          schema:
            type: integer
            example: 10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurantId]
              properties:
                restaurantId:
                  type: integer
                  example: 1
                memo:
                  type: string
                  maxLength: 200
                  example: "삼겹살에 미나리 조합은 이길 수가 없음"
      responses:
        "201":
          description: 식당 추가 성공
          content:
            application/json:
              example:
                success: true
                data:
                  itemId: 30
                  listId: 10
                  restaurantId: 1
                  restaurantName: "을지삼겹"
                  memo: "삼겹살에 미나리 조합은 이길 수가 없음"
                message: "리스트에 식당이 추가되었습니다."
        "400":
          description: restaurantId 없음 / memo 200자 초과 / 아이템 5000개 초과 (LIST_ITEM_LIMIT_EXCEEDED)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 로그인하지 않은 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 리스트 작성자가 아님
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 리스트 또는 식당이 존재하지 않음 (LIST_NOT_FOUND / RESTAURANT_NOT_FOUND)
