  /api/v1/lists/{id}/items:
    post:
      tags: [Lists]
      summary: 리스트에 식당 추가
      description: 맛집 리스트에 식당을 추가합니다. 본인만 가능합니다. 리스트당 최대 5,000개까지 등록 가능합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 리스트 ID
          schema:
            type: integer
            example: 10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurantId]
              properties:
                restaurantId:
                  type: integer
                  example: 1
                memo:
                  type: string
                  maxLength: 200
                  example: "삼겹살에 미나리 조합은 이길 수가 없음"
      responses:
        "201":
          description: 식당 추가 성공
          content:
            application/json:
              example:
                success: true
                data:
                  itemId: 30
                  listId: 10
                  restaurantId: 1
                  restaurantName: "을지삼겹"
                  memo: "삼겹살에 미나리 조합은 이길 수가 없음"
                message: "리스트에 식당이 추가되었습니다."
        "400":
          description: restaurantId 없음 / memo 200자 초과 / 아이템 5000개 초과 (LIST_ITEM_LIMIT_EXCEEDED)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "LIST_ITEM_LIMIT_EXCEEDED"
                  message: "리스트에 추가할 수 있는 식당은 최대 5,000개입니다."
        "401":
          description: 로그인하지 않은 사용자
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "UNAUTHORIZED"
                  message: "로그인 후 이용해주세요."
        "403":
          description: 리스트 작성자가 아님
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "FORBIDDEN"
                  message: "리스트 작성자만 식당을 추가할 수 있습니다."
        "404":
          description: 리스트 또는 식당이 존재하지 않음 (LIST_NOT_FOUND / RESTAURANT_NOT_FOUND)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "LIST_NOT_FOUND"
                  message: "존재하지 않는 맛집 리스트입니다."
        "409":
          description: 이미 해당 리스트에 같은 식당 존재 (DUPLICATE_LIST_ITEM)
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "DUPLICATE_LIST_ITEM"
                  message: "이미 리스트에 추가된 식당입니다."
        "500":
          description: 리스트 아이템 저장 실패
          content:
            application/json:
              example:
                success: false
                data: null
                error:
                  code: "INTERNAL_SERVER_ERROR"
                  message: "서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

