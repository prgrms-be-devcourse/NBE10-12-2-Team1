name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 25 설정
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: application.yaml 생성
        run: |
          cat > Backend/application.yaml << EOF
          app:
            frontend:
              url: ${{ secrets.FRONTEND_URL }}
          jwt:
            secret: ${{ secrets.JWT_SECRET }}
            access-expiration: 3600000
            refresh-expiration: 604800000
          cookie:
            secure: false
            same-site: Lax
          spring:
            application:
              name: WhatToEat
            datasource:
              url: jdbc:mysql://localhost:3306/whattoeat?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
              driver-class-name: com.mysql.cj.jdbc.Driver
              username: whattoeat
              password: whattoeat
            jpa:
              hibernate:
                ddl-auto: update
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.MySQLDialect
            security:
              oauth2:
                client:
                  registration:
                    kakao:
                      client-id: ${{ secrets.KAKAO_CLIENT_ID }}
                      client-secret: ${{ secrets.KAKAO_CLIENT_SECRET }}
                      client-authentication-method: client_secret_post
                      scope: profile_nickname, profile_image, account_email
                      client-name: Kakao
                      authorization-grant-type: authorization_code
                      redirect-uri: '{baseUrl}/{action}/oauth2/code/{registrationId}'
                  provider:
                    kakao:
                      authorization-uri: https://kauth.kakao.com/oauth/authorize
                      token-uri: https://kauth.kakao.com/oauth/token
                      user-info-uri: https://kapi.kakao.com/v2/user/me
                      user-name-attribute: id
            data:
              redis:
                host: localhost
                port: 6380
          springdoc:
            default-produces-media-type: application/json;charset=UTF-8
          EOF

      - name: jar 빌드
        run: cd Backend && ./gradlew bootJar -x test

      - name: EC2에 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "Backend/build/libs/*.jar,Backend/application.yaml"
          target: "/home/ubuntu/whattoeat/new/"
          strip_components: 3

      - name: EC2에서 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            kill $(cat /home/ubuntu/whattoeat/app.pid) 2>/dev/null || true
            sleep 3
            mv /home/ubuntu/whattoeat/new/*.jar /home/ubuntu/whattoeat/app.jar
            mv /home/ubuntu/whattoeat/new/application.yaml /home/ubuntu/whattoeat/application.yaml
            rm -rf /home/ubuntu/whattoeat/new
            cd /home/ubuntu/whattoeat
            nohup java -jar -Dspring.config.location=./application.yaml -Dserver.port=8081 app.jar > app.log 2>&1 &
            echo $! > /home/ubuntu/whattoeat/app.pid
