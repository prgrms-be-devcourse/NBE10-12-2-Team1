name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 25 설정
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: application.yaml 생성
        run: |
          cat > Backend/application.yaml << EOF
          app:
            frontend:
              url: ${{ secrets.FRONTEND_URL }}
            upload:
              url-prefix: http://${{ secrets.EC2_HOST }}:8081/uploads/
          jwt:
            secret: ${{ secrets.JWT_SECRET }}
            access-expiration: 3600000
            refresh-expiration: 604800000
          cookie:
            secure: false
            same-site: Lax
          spring:
            application:
              name: WhatToEat
            datasource:
              url: jdbc:mysql://localhost:3306/whattoeat?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
              driver-class-name: com.mysql.cj.jdbc.Driver
              username: whattoeat
              password: whattoeat
            jpa:
              hibernate:
                ddl-auto: update
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.MySQLDialect
            security:
              oauth2:
                client:
                  registration:
                    kakao:
                      client-id: ${{ secrets.KAKAO_CLIENT_ID }}
                      client-secret: ${{ secrets.KAKAO_CLIENT_SECRET }}
                      client-authentication-method: client_secret_post
                      scope: profile_nickname, profile_image, account_email
                      client-name: Kakao
                      authorization-grant-type: authorization_code
                      redirect-uri: '{baseUrl}/{action}/oauth2/code/{registrationId}'
                  provider:
                    kakao:
                      authorization-uri: https://kauth.kakao.com/oauth/authorize
                      token-uri: https://kauth.kakao.com/oauth/token
                      user-info-uri: https://kapi.kakao.com/v2/user/me
                      user-name-attribute: id
            data:
              redis:
                host: localhost
                port: 6380
          springdoc:
            default-produces-media-type: application/json;charset=UTF-8
          EOF

      - name: jar 빌드
        run: cd Backend && ./gradlew bootJar -x test

      - name: EC2에 jar 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "Backend/build/libs/*.jar"
          target: "/home/ubuntu/whattoeat/new/"
          strip_components: 3

      - name: EC2에 application.yaml 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "Backend/application.yaml"
          target: "/home/ubuntu/whattoeat/new/"
          strip_components: 1

      - name: EC2에서 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /home/ubuntu/whattoeat

            echo "MySQL/Redis 컨테이너 기동 확인"
            docker start whattoeat-mysql whattoeat-redis 2>/dev/null || true

            OLD_PID=""
            if [ -f app.pid ]; then
              OLD_PID=$(cat app.pid)
            fi

            if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
              kill "$OLD_PID" 2>/dev/null || true
              for i in $(seq 1 30); do
                kill -0 "$OLD_PID" 2>/dev/null || break
                sleep 1
              done
              if kill -0 "$OLD_PID" 2>/dev/null; then
                echo "old process $OLD_PID did not stop gracefully, forcing kill"
                kill -9 "$OLD_PID" 2>/dev/null || true
                sleep 2
              fi
            fi

            JAR_FILE=$(find new -type f -name "*.jar" | head -1)
            YAML_FILE=$(find new -type f -name "application.yaml" | head -1)

            if [ -z "$JAR_FILE" ] || [ -z "$YAML_FILE" ]; then
              echo "jar or application.yaml not found under new/ (strip_components mismatch?)"
              find new
              exit 1
            fi

            mv "$JAR_FILE" app.jar
            mv "$YAML_FILE" application.yaml
            rm -rf new

            nohup java -jar -Dspring.config.location=./application.yaml -Dserver.port=8081 app.jar > app.log 2>&1 &
            NEW_PID=$!
            echo $NEW_PID > app.pid

            HEALTHY=false
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8081/api/v1/restaurants > /dev/null; then
                HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "backend failed to become healthy after restart"
              tail -100 app.log
              exit 1
            fi

            if [ "$(docker exec whattoeat-redis redis-cli ping 2>/dev/null)" != "PONG" ]; then
              echo "WARNING: redis is not responding — feed/notification stream will silently stop working"
            fi

            echo "backend restarted successfully (pid=$NEW_PID)"
